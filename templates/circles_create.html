{% extends "base.html" %}
{% block title %}Create a Circle{% endblock %}
{% block content %}
<div class="form-page">
  <h1 class="page-title">{{ t("salon", "create_circle") }}</h1>
  {% if error %}<p class="form-error">{{ error }}</p>{% endif %}
  <form method="POST" action="{{ url_for('circles_create') }}" class="salon-form">
    <div class="form-group">
      <label for="name">{{ t("salon", "circle_name") }}</label>
      <input type="text" id="name" name="name" placeholder="e.g. Classical Poetry Salon" required>
    </div>
    <div class="form-group">
      <label for="description">{{ t("salon", "circle_description") }}</label>
      <textarea id="description" name="description" rows="4"
                placeholder="What will your circle discuss?"></textarea>
    </div>
    <button type="submit" class="btn-primary">{{ t("salon", "create") }}</button>
    <a href="{{ url_for('circles') }}" class="btn-secondary">Cancel</a>
  </form>
</div>
{% endblock %}
