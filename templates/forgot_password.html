{% extends "base.html" %}
{% block content %}

<form method="post" class="auth-form">
    <h2>{{ t("auth", "forgot_password") }}</h2>

    {% if error %}
        <p class="form-error">{{ error }}</p>
    {% endif %}
    {% if success %}
        <p class="form-success">{{ success }}</p>
    {% endif %}

    <label for="email">{{ t("auth", "email") }}</label>
    <input id="email" type="email" name="email" placeholder="{{ t('auth', 'email') }}"
           autocomplete="email" required>

    <button type="submit">{{ t("auth", "send_reset") }}</button>

    <p class="auth-link">
        <a href="{{ url_for('login') }}">← {{ t("auth", "login_btn") }}</a>
    </p>
</form>

{% endblock %}
