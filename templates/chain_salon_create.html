{% extends "base.html" %}
{% block title %}Start a Chain Poem{% endblock %}
{% block content %}
<div class="form-page">
  <h1 class="page-title">{{ t("salon", "start_chain") }}</h1>
  {% if error %}<p class="form-error">{{ error }}</p>{% endif %}
  <form method="POST" action="{{ url_for('chain_salon_create') }}" class="salon-form">
    <div class="form-group">
      <label for="title">{{ t("salon", "temp_title") }}</label>
      <input type="text" id="title" name="title" placeholder="Give your poem a working title…" required>
    </div>
    <div class="form-group">
      <label for="stanza_text">{{ t("salon", "first_stanza") }}</label>
      <textarea id="stanza_text" name="stanza_text" rows="6"
                placeholder="Write the opening stanza — set the tone for those who follow…" required></textarea>
    </div>
    <button type="submit" class="btn-primary">{{ t("salon", "begin_poem") }}</button>
    <a href="{{ url_for('chain_salon') }}" class="btn-secondary">Cancel</a>
  </form>
</div>
{% endblock %}
