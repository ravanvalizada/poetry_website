{% extends "base.html" %}
{% block content %}

<form method="post" class="upload-form">
    <h2>{{ t("poem", "edit_page_title") }}</h2>

    {% if error %}
        <p class="form-error">{{ error }}</p>
    {% endif %}

    <label for="title">{{ t("poem", "title") }}</label>
    <input type="text" id="title" name="title" value="{{ poem.title }}" required>

    <label for="text">{{ t("poem", "text") }}</label>
    <textarea id="text" name="text" rows="22" required>{{ poem.text }}</textarea>

    <div style="display:flex; gap:12px; margin-top:8px;">
        <button type="submit">{{ t("poem", "save") }}</button>
        <a href="{{ url_for('profile', user_id=owner_id) }}"
           style="display:inline-flex; align-items:center; padding:12px 22px;
                  font-family:var(--font-display); font-size:0.68rem; letter-spacing:0.14em;
                  text-transform:uppercase; border:1px solid var(--border); border-radius:2px;
                  color:var(--ink-muted); text-decoration:none; transition:all 0.2s;"
           onmouseover="this.style.borderColor='var(--sepia)';this.style.color='var(--sepia)'"
           onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--ink-muted)'">
            {{ t("common", "cancel") }}
        </a>
    </div>
</form>

<a href="{{ url_for('home') }}" style="display:inline-block; margin-top:16px;">← {{ t("common", "back") }}</a>

{% endblock %}
